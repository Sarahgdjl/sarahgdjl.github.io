<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>Sarah Goudjil — Data Scientist & AI Architect</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
  /* ===== RESET & BASE ===== */
  *, *::before, *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }
  :root {
    --bg: #0a0608;
    --bg2: #100b0d;
    --bg3: #160e11;
    --card: #120d0f;
    --card2: #1a1015;
    --red: #77190e;
    --red2: #e84c3d;
    --red-dim: rgba(192,57,43,0.15);
    --red-glow: rgba(192,57,43,0.08);
    --blue: #3a7bd5;
    --blue2: #5b9cf6;
    --blue-dim: rgba(58,123,213,0.15);
    --blue-glow: rgba(58,123,213,0.07);
    --text: #ede8e9;
    --text2: #b8a8ab;
    --muted: #6e5a5e;
    --dim: #2e2025;
    --border: rgba(192,57,43,0.1);
    --border2: rgba(192,57,43,0.22);
    --border-blue: rgba(58,123,213,0.18);
    --transition-smooth: cubic-bezier(0.25, 0.46, 0.45, 0.94);
    --transition-bounce: cubic-bezier(0.34, 1.2, 0.64, 1);
  }

  html {
    scroll-behavior: smooth;
    scroll-padding-top: 80px;
  }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Outfit', sans-serif;
    font-size: 16px;
    line-height: 1.6;
    overflow-x: hidden;
    position: relative;
  }
  /* noise grain + vignette */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
    opacity: 0.6;
    pointer-events: none;
    z-index: 0;
  }
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(circle at 50% 30%, rgba(10,6,8,0) 40%, rgba(0,0,0,0.4) 100%);
    pointer-events: none;
    z-index: 0;
  }

  /* ===== SCROLL REVEAL ANIMATIONS ===== */
  .reveal {
    opacity: 0;
    transform: translateY(28px);
    transition: opacity 0.7s var(--transition-smooth), transform 0.7s var(--transition-smooth);
  }
  .reveal.revealed {
    opacity: 1;
    transform: translateY(0);
  }
  .reveal-delay-1 { transition-delay: 0.1s; }
  .reveal-delay-2 { transition-delay: 0.2s; }
  .reveal-delay-3 { transition-delay: 0.35s; }

  /* NAVIGATION */
  nav {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1.2rem 3rem;
    background: rgba(10,6,8,0.6);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
    transition: all 0.4s var(--transition-smooth);
  }
  nav.scrolled {
    padding: 0.8rem 3rem;
    background: rgba(10,6,8,0.85);
    backdrop-filter: blur(24px);
    border-bottom-color: rgba(192,57,43,0.3);
  }
  .nav-logo {
    font-family: 'DM Serif Display', serif;
    font-size: 1.2rem;
    color: var(--text);
    text-decoration: none;
    letter-spacing: 0.02em;
    transition: all 0.2s ease;
  }
  .nav-logo:hover { transform: scale(1.02); color: var(--red2); }
  .nav-logo em { color: var(--red2); font-style: italic; }
  .nav-links { display: flex; gap: 2.5rem; list-style: none; }
  .nav-links a {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    text-decoration: none;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    transition: color 0.2s;
    position: relative;
  }
  .nav-links a::after {
    content: '';
    position: absolute;
    bottom: -4px;
    left: 0;
    width: 0;
    height: 1px;
    background: var(--red2);
    transition: width 0.3s var(--transition-smooth);
  }
  .nav-links a:hover { color: var(--text2); }
  .nav-links a:hover::after { width: 100%; }

  /* ========== REDESIGNED HERO SECTION ========== */
  #hero {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    position: relative;
    z-index: 2;
    overflow: hidden;
  }
  
  /* animated gradient orb behind hero */
  .hero-orb {
    position: absolute;
    top: 20%;
    right: -10%;
    width: 50vw;
    height: 50vw;
    background: radial-gradient(circle, rgba(232,76,61,0.12) 0%, rgba(58,123,213,0.05) 60%, transparent 80%);
    border-radius: 50%;
    filter: blur(80px);
    animation: floatOrb 20s ease-in-out infinite;
    pointer-events: none;
    z-index: 0;
  }
  @keyframes floatOrb {
    0%, 100% { transform: translate(0, 0) scale(1); opacity: 0.6; }
    50% { transform: translate(-30px, 20px) scale(1.1); opacity: 0.9; }
  }
  
  .hero-container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 8rem 3rem 5rem;
    position: relative;
    z-index: 2;
  }
  
  .hero-badge {
    display: inline-flex;
    align-items: center;
    gap: 0.75rem;
    background: rgba(232,76,61,0.08);
    backdrop-filter: blur(4px);
    border: 1px solid var(--border2);
    border-radius: 100px;
    padding: 0.5rem 1.2rem 0.5rem 0.8rem;
    margin-bottom: 2rem;
    transition: all 0.3s ease;
  }
  .hero-badge:hover {
    border-color: var(--red2);
    background: rgba(232,76,61,0.12);
  }
  .badge-dot {
    width: 8px;
    height: 8px;
    background: var(--red2);
    border-radius: 50%;
    animation: pulseRed 1.8s infinite;
  }
  .badge-text {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--red2);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  
  .hero-title {
    margin-bottom: 2rem;
  }
  .hero-greeting {
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    color: var(--muted);
    letter-spacing: 0.15em;
    margin-bottom: 1rem;
    text-transform: uppercase;
  }
  .hero-name {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(4rem, 12vw, 8rem);
    font-weight: 400;
    line-height: 0.92;
    margin: 0.5rem 0;
  }
  .name-first {
    display: block;
    color: var(--text);
    background: linear-gradient(135deg, var(--text) 0%, #fff 100%);
    background-clip: text;
    -webkit-background-clip: text;
    color: transparent;
  }
  .name-last {
    display: block;
    color: transparent;
    -webkit-text-stroke: 1.5px var(--red2);
    letter-spacing: 0.02em;
    transition: all 0.3s;
  }
  .hero-name:hover .name-last {
    -webkit-text-stroke: 1.5px var(--blue2);
    transform: translateX(4px);
  }
  
  .hero-tagline {
    font-size: 1.25rem;
    color: var(--text2);
    font-weight: 400;
    letter-spacing: -0.01em;
    max-width: 600px;
    margin: 1.5rem 0 2rem;
    line-height: 1.5;
  }
  .hero-tagline strong {
    color: var(--red2);
    font-weight: 500;
  }
  
  .hero-stats-row {
    display: flex;
    gap: 3rem;
    margin: 2rem 0 2.5rem;
    flex-wrap: wrap;
  }
  .hero-stat {
    display: flex;
    flex-direction: column;
  }
  .hero-stat-value {
    font-family: 'DM Serif Display', serif;
    font-size: 2.8rem;
    color: var(--text);
    line-height: 1;
  }
  .hero-stat-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-top: 0.5rem;
  }
  
  .hero-actions {
    display: flex;
    gap: 1rem;
    flex-wrap: wrap;
    margin-bottom: 3rem;
  }
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 0.6rem;
    padding: 0.85rem 2rem;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.08em;
    text-decoration: none;
    border-radius: 40px;
    transition: all 0.35s var(--transition-smooth);
    cursor: pointer;
    text-transform: uppercase;
    font-weight: 500;
  }
  .btn-primary {
    background: var(--red);
    color: #fff;
    border: 1px solid var(--red);
  }
  .btn-primary:hover {
    background: var(--red2);
    border-color: var(--red2);
    transform: translateY(-3px);
    box-shadow: 0 10px 24px rgba(232,76,61,0.3);
    gap: 0.9rem;
  }
  .btn-secondary {
    background: transparent;
    color: var(--text2);
    border: 1px solid var(--dim);
  }
  .btn-secondary:hover {
    border-color: var(--red2);
    color: var(--text);
    transform: translateY(-3px);
    background: rgba(119,25,14,0.1);
  }
  
  .hero-scroll-indicator {
    position: absolute;
    bottom: 2.5rem;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.5rem;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    transition: opacity 0.3s;
    z-index: 3;
  }
  .hero-scroll-indicator:hover {
    color: var(--red2);
  }
  .scroll-mouse {
    width: 24px;
    height: 38px;
    border: 1.5px solid var(--muted);
    border-radius: 20px;
    position: relative;
    transition: border-color 0.3s;
  }
  .hero-scroll-indicator:hover .scroll-mouse {
    border-color: var(--red2);
  }
  .scroll-wheel {
    width: 3px;
    height: 8px;
    background: var(--red2);
    border-radius: 2px;
    position: absolute;
    top: 7px;
    left: 50%;
    transform: translateX(-50%);
    animation: scrollWheel 2s infinite;
  }
  @keyframes scrollWheel {
    0% { opacity: 1; transform: translateX(-50%) translateY(0); }
    80% { opacity: 0.3; transform: translateX(-50%) translateY(12px); }
    100% { opacity: 1; transform: translateX(-50%) translateY(0); }
  }
  
  @keyframes pulseRed {
    0%,100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.9); }
  }
  
  /* rest of sections stay consistent */
  .divider {
    width: 100%;
    height: 1px;
    background: linear-gradient(to right, transparent, var(--border), var(--red-dim), var(--border), transparent);
    margin: 0;
  }
  section { position: relative; z-index: 2; }
  .section-inner { padding: 6rem 3rem; max-width: 1080px; margin: 0 auto; }
  .eyebrow {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin-bottom: 3.5rem;
  }
  .eyebrow-num {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--red2);
    letter-spacing: 0.15em;
  }
  .eyebrow-title {
    font-family: 'DM Serif Display', serif;
    font-size: 2rem;
    color: var(--text);
    font-weight: 400;
  }
  .eyebrow-rule { flex: 1; height: 1px; background: var(--border); }
  .about-layout {
    display: grid;
    grid-template-columns: 1.2fr 1fr;
    gap: 5rem;
    align-items: start;
  }
  .about-text p {
    color: var(--text2);
    font-size: 1rem;
    line-height: 1.9;
    margin-bottom: 1.2rem;
    font-weight: 300;
  }
  .info-stack {
    display: flex;
    flex-direction: column;
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
    transition: box-shadow 0.3s;
  }
  .info-stack:hover { box-shadow: 0 8px 20px rgba(0,0,0,0.3); }
  .info-row {
    display: grid;
    grid-template-columns: 90px 1fr;
    gap: 1rem;
    padding: 0.9rem 1.2rem;
    border-bottom: 1px solid var(--border);
    transition: all 0.25s ease;
  }
  .info-row:last-child { border-bottom: none; }
  .info-row:hover { background: var(--red-glow); transform: translateX(4px); }
  .info-key { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; }
  .info-val { font-size: 13.5px; color: var(--text2); }
  #skills { background: var(--bg2); }
  .skills-layout {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
  }
  .skill-block {
    background: var(--bg2);
    padding: 2rem;
    transition: all 0.35s var(--transition-smooth);
  }
  .skill-block:hover {
    background: var(--card2);
    transform: scale(1.01);
    box-shadow: inset 0 0 0 1px var(--red-dim);
  }
  .skill-block-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--blue2);
    letter-spacing: 0.14em;
    text-transform: uppercase;
    margin-bottom: 1.25rem;
  }
  .skill-chips { display: flex; flex-wrap: wrap; gap: 0.6rem; }
  .chip {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text2);
    background: var(--blue-dim);
    border: 1px solid var(--border-blue);
    padding: 5px 12px;
    border-radius: 20px;
    transition: all 0.2s;
  }
  .chip:hover {
    color: var(--blue2);
    border-color: var(--blue2);
    transform: translateY(-2px);
  }
  /* project cards grid */
  .projects-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 2rem;
  }
  .project-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    transition: all 0.4s var(--transition-smooth);
    text-decoration: none;
    color: inherit;
    display: flex;
    flex-direction: column;
    position: relative;
  }
  .project-card:hover {
    transform: translateY(-6px);
    border-color: rgba(232,76,61,0.4);
    box-shadow: 0 20px 32px -12px rgba(0,0,0,0.5);
    background: var(--card2);
  }
  .card-header {
    padding: 1.5rem 1.5rem 0.5rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
  }
  .card-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--red2);
    background: var(--red-dim);
    padding: 3px 10px;
    border-radius: 20px;
  }
  .status-dot {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
  }
  .status-dot.live { color: var(--red2); }
  .status-dot.live::before {
    content: '';
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--red2);
    animation: pulseRed 1.4s infinite;
  }
  .status-dot.soon { color: var(--muted); }
  .card-title {
    font-family: 'DM Serif Display', serif;
    font-size: 1.4rem;
    font-weight: 400;
    padding: 0.5rem 1.5rem 0.25rem;
    color: var(--text);
  }
  .project-card:hover .card-title { color: var(--red2); }
  .card-desc {
    font-size: 13px;
    color: var(--text2);
    line-height: 1.65;
    padding: 0 1.5rem;
    font-weight: 300;
    flex: 1;
  }
  .card-chips {
    padding: 1rem 1.5rem 1.5rem;
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
  }
  .proj-chip {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--blue2);
    border: 1px solid var(--border-blue);
    background: var(--blue-glow);
    padding: 3px 10px;
    border-radius: 20px;
  }
  .card-arrow {
    position: absolute;
    bottom: 1rem;
    right: 1.2rem;
    font-size: 1.2rem;
    color: var(--muted);
    opacity: 0;
    transition: all 0.3s;
  }
  .project-card:hover .card-arrow {
    opacity: 1;
    transform: translate(3px, -3px);
    color: var(--red2);
  }
  .project-card.featured {
    background: linear-gradient(145deg, var(--card2), #130b0e);
    border-left: 3px solid var(--red2);
  }
  @media (max-width: 800px) {
    .projects-grid { grid-template-columns: 1fr; }
  }
  #contact { background: var(--bg2); }
  .contact-layout {
    display: grid;
    grid-template-columns: 1.1fr 1fr;
    gap: 6rem;
    align-items: start;
  }
  .contact-heading {
    font-family: 'DM Serif Display', serif;
    font-size: 2.75rem;
    font-weight: 400;
    line-height: 1.1;
    margin-bottom: 1.5rem;
  }
  .contact-heading em { font-style: italic; color: var(--red2); }
  .contact-sub { color: var(--text2); font-weight: 300; line-height: 1.8; margin-bottom: 2rem; font-size: 0.95rem; }
  .contact-mail {
    display: inline-flex;
    align-items: center;
    gap: 0.6rem;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--red2);
    text-decoration: none;
    border-bottom: 1px dashed var(--border2);
    padding-bottom: 4px;
    transition: all 0.3s;
  }
  .contact-mail:hover { color: var(--text); gap: 0.8rem; }
  .link-list {
    display: flex;
    flex-direction: column;
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
  }
  .link-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1rem 1.4rem;
    text-decoration: none;
    color: var(--text2);
    border-bottom: 1px solid var(--border);
    transition: all 0.25s;
  }
  .link-item:hover {
    background: var(--red-glow);
    color: var(--text);
    transform: translateX(5px);
  }
  .link-platform {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.1em;
  }
  .link-arr { color: var(--dim); transition: transform 0.2s; }
  .link-item:hover .link-arr { transform: rotate(45deg); color: var(--red2); }
  footer {
    padding: 1.8rem 3rem;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
  }
  .footer-sig { font-family: 'DM Serif Display', serif; font-size: 0.9rem; color: var(--muted); font-style: italic; }
  .footer-mono { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--dim); }
  @media (max-width: 768px) {
    nav { padding: 0.9rem 1.5rem; }
    .hero-container { padding: 6rem 1.5rem 4rem; }
    .hero-stat-value { font-size: 2rem; }
    .hero-stats-row { gap: 1.8rem; }
    .about-layout, .contact-layout { grid-template-columns: 1fr; gap: 2rem; }
    .skills-layout { grid-template-columns: 1fr; }
    .section-inner { padding: 3rem 1.5rem; }
    footer { flex-direction: column; text-align: center; gap: 0.6rem; }
  }
</style>
</head>
<body>

<nav>
  <a href="#hero" class="nav-logo">Sarah <em>G.</em></a>
  <ul class="nav-links">
    <li><a href="#about">About</a></li>
    <li><a href="#skills">Skills</a></li>
    <li><a href="#projects">Projects</a></li>
    <li><a href="#contact">Contact</a></li>
  </ul>
</nav>

<section id="hero">
  <div class="hero-orb"></div>
  <div class="hero-container">
    <div class="hero-badge reveal revealed">
      <span class="badge-dot"></span>
      <span class="badge-text" id="hero-tagline">Data Scientist · AI Architect</span>
    </div>
    <div class="hero-title reveal revealed">
      <div class="hero-greeting">Hello, I'm</div>
      <h1 class="hero-name">
        <span class="name-first" id="hero-firstname">Sarah</span>
        <span class="name-last" id="hero-lastname">Goudjil</span>
      </h1>
    </div>
    <p class="hero-tagline reveal reveal-delay-1" id="hero-desc">Loading...</p>
    <div class="hero-stats-row reveal reveal-delay-2" id="hero-stats"></div>
    <div class="hero-actions reveal reveal-delay-3">
      <a href="#projects" class="btn btn-primary">Explore work →</a>
      <a href="#contact" class="btn btn-secondary">Let's connect</a>
    </div>
  </div>
  <a href="#about" class="hero-scroll-indicator">
    <div class="scroll-mouse"><div class="scroll-wheel"></div></div>
    <span>Scroll</span>
  </a>
</section>

<div class="divider"></div>
<section id="about"><div class="section-inner"><div class="eyebrow"><span class="eyebrow-num">01</span><h2 class="eyebrow-title">About</h2><div class="eyebrow-rule"></div></div><div class="about-layout"><div class="about-text" id="about-text"></div><div class="info-stack" id="about-info"></div></div></div></section>
<div class="divider"></div>
<section id="skills"><div class="section-inner"><div class="eyebrow"><span class="eyebrow-num">02</span><h2 class="eyebrow-title">Skills</h2><div class="eyebrow-rule"></div></div><div class="skills-layout" id="skills-layout"></div></div></section>
<div class="divider"></div>
<section id="projects"><div class="section-inner"><div class="eyebrow"><span class="eyebrow-num">03</span><h2 class="eyebrow-title">Projects</h2><div class="eyebrow-rule"></div></div><div class="projects-grid" id="projects-grid"></div></div></section>
<div class="divider"></div>
<section id="contact"><div class="section-inner"><div class="eyebrow"><span class="eyebrow-num">04</span><h2 class="eyebrow-title">Contact</h2><div class="eyebrow-rule"></div></div><div class="contact-layout"><div><h3 class="contact-heading">Let's<br/><em>collaborate.</em></h3><p class="contact-sub" id="contact-blurb"></p><a class="contact-mail" id="contact-email" href="#">loading...</a></div><div class="link-list" id="contact-links"></div></div></div></section>
<footer><span class="footer-sig" id="footer-name">Sarah Goudjil</span><span class="footer-mono">© 2025 · Algiers, DZ</span></footer>

<script>
  const portfolioData = {
    hero: {
      firstName: "Sarah",
      lastName: "Goudjil",
      title: "Data Scientist · AI Architect",
      description: "Building <strong>intelligent systems</strong> that fuse data science with human insight. <strong>5+ years</strong> shaping production-grade AI & analytics pipelines.",
      stats: [{ value: "15+", label: "Projects" }, { value: "4", label: "Patents" }, { value: "8", label: "Publications" }]
    },
    about: {
      paragraphs: [
        "I'm Sarah, a Data Scientist based in Algiers, specialized in machine learning, MLOps, and generative AI. I transform raw data into strategic decisions and deploy scalable models that drive real impact.",
        "Currently, I lead AI research initiatives and work with interdisciplinary teams to design ethical, high-performance algorithms. Outside coding, I mentor young women in tech and write about AI frontiers."
      ],
      info: [
        { key: "Location", value: "Algiers, Algeria / Remote" },
        { key: "Expertise", value: "Computer Vision, LLMs, Time Series" },
        { key: "Education", value: "MSc Data Science, Polytechnique" },
        { key: "Code", value: "Python, TensorFlow, PyTorch, Spark" }
      ]
    },
    skills: [
      { category: "Core machine learning", items: ["Supervised Learning", "Ensembles", "Deep Learning", "Reinforcement Learning"] },
      { category: "MLOps & cloud", items: ["Docker", "Kubeflow", "AWS", "MLflow", "FastAPI"] },
      { category: "Data engineering", items: ["SQL", "PySpark", "Airflow", "dbt", "BigQuery"] },
      { category: "Generative AI", items: ["LangChain", "RAG", "HuggingFace", "LlamaIndex", "VAEs"] }
    ],
    projects: [
      { featured: true, label: "Featured Research", title: "MediScan AI", desc: "Multi-modal vision-language model for radiology reports, achieving 94% accuracy.", tags: ["PyTorch", "ViT", "LLaVA"], status: "live", link: "#" },
      { featured: false, label: "Climate AI", title: "AtmoSense", desc: "Spatiotemporal transformer for extreme weather prediction, reducing error by 23%.", tags: ["GNN", "Xarray", "Earth Engine"], status: "live", link: "#" },
      { featured: false, label: "NLP", title: "FakeGuard", desc: "Real-time misinformation detection for low-resource languages.", tags: ["BERT", "FastText", "Streamlit"], status: "live", link: "#" },
      { featured: false, label: "AutoML", title: "AutoML Pipeline", desc: "Open-source library automating feature engineering & hyperparameter tuning.", tags: ["Ray", "Optuna", "Pandas"], status: "soon", link: "#" },
      { featured: false, label: "Graph Learning", title: "GraphRec", desc: "Heterogeneous GNN for e-commerce recommendation with cold-start mitigation.", tags: ["DGL", "GraphSage", "Neo4j"], status: "live", link: "#" }
    ],
    contact: {
      blurb: "Push the boundaries of AI together. Available for collaborations, speaking, or research.",
      email: "s.goudjil@datascience.xyz",
      links: [
        { platform: "GitHub", url: "https://github.com/sarahgoudjil" },
        { platform: "LinkedIn", url: "https://linkedin.com/in/sarah-goudjil" },
        { platform: "Google Scholar", url: "https://scholar.google.com/" },
        { platform: "Twitter", url: "https://twitter.com/sarah_ai" }
      ]
    }
  };

  function applyReveal() {
    const reveals = document.querySelectorAll('.reveal');
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('revealed'); });
    }, { threshold: 0.1 });
    reveals.forEach(r => observer.observe(r));
  }
  function renderHero(h) {
    document.getElementById('hero-firstname').innerHTML = h.firstName;
    document.getElementById('hero-lastname').innerHTML = h.lastName;
    document.getElementById('hero-tagline').innerHTML = h.title;
    document.getElementById('hero-desc').innerHTML = h.description;
    document.querySelector('.nav-logo').innerHTML = `${h.firstName} <em>${h.lastName.charAt(0)}.</em>`;
    document.getElementById('footer-name').innerHTML = `${h.firstName} ${h.lastName}`;
    document.getElementById('hero-stats').innerHTML = h.stats.map(s => `<div class="hero-stat"><div class="hero-stat-value">${s.value}</div><div class="hero-stat-label">${s.label}</div></div>`).join('');
  }
  function renderAbout(a) {
    document.getElementById('about-text').innerHTML = a.paragraphs.map(p => `<p>${p}</p>`).join('');
    document.getElementById('about-info').innerHTML = a.info.map(i => `<div class="info-row"><span class="info-key">${i.key}</span><span class="info-val">${i.value}</span></div>`).join('');
  }
  function renderSkills(skills) {
    document.getElementById('skills-layout').innerHTML = skills.map(s => `<div class="skill-block"><div class="skill-block-label">${s.category}</div><div class="skill-chips">${s.items.map(i => `<span class="chip">${i}</span>`).join('')}</div></div>`).join('');
  }
  function renderProjects(projects) {
    const container = document.getElementById('projects-grid');
    container.innerHTML = projects.map(p => `<a href="${p.link}" class="project-card ${p.featured ? 'featured' : ''}"><div class="card-header"><span class="card-label">${p.label}</span><span class="status-dot ${p.status}">${p.status === 'live' ? 'active' : 'upcoming'}</span></div><div class="card-title">${p.title}</div><div class="card-desc">${p.desc}</div><div class="card-chips">${p.tags.map(t => `<span class="proj-chip">${t}</span>`).join('')}</div><div class="card-arrow">↗</div></a>`).join('');
  }
  function renderContact(c) {
    document.getElementById('contact-blurb').innerHTML = c.blurb;
    const emailEl = document.getElementById('contact-email');
    emailEl.href = `mailto:${c.email}`;
    emailEl.innerHTML = `✉ ${c.email}`;
    document.getElementById('contact-links').innerHTML = c.links.map(l => `<a href="${l.url}" target="_blank" class="link-item"><span class="link-platform">${l.platform}</span><span>${l.url.replace('https://', '').replace('www.', '')}</span><span class="link-arr">↗</span></a>`).join('');
  }
  function initNav() {
    window.addEventListener('scroll', () => {
      document.querySelector('nav').classList.toggle('scrolled', window.scrollY > 50);
    });
  }
  renderHero(portfolioData.hero);
  renderAbout(portfolioData.about);
  renderSkills(portfolioData.skills);
  renderProjects(portfolioData.projects);
  renderContact(portfolioData.contact);
  applyReveal();
  initNav();
</script>
</body>
</html>
