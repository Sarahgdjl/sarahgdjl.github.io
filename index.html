<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Sarah Goudjil — Data Scientist</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0608;
  --bg2:#100b0d;
  --bg3:#160e11;
  --card:#120d0f;
  --card2:#1a1015;
  --red:#77190e;
  --red2:#e84c3d;
  --red-dim:rgba(192,57,43,0.15);
  --red-glow:rgba(192,57,43,0.08);
  --blue:#3a7bd5;
  --blue2:#5b9cf6;
  --blue-dim:rgba(58,123,213,0.15);
  --blue-glow:rgba(58,123,213,0.07);
  --text:#ede8e9;
  --text2:#b8a8ab;
  --muted:#6e5a5e;
  --dim:#2e2025;
  --border:rgba(192,57,43,0.1);
  --border2:rgba(192,57,43,0.22);
  --border-blue:rgba(58,123,213,0.18);
}

html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;font-size:16px;line-height:1.6;overflow-x:hidden}

body::after{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");opacity:0.4;pointer-events:none;z-index:0}

nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:1.1rem 3rem;background:rgba(10,6,8,0.8);backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
.nav-logo{font-family:'DM Serif Display',serif;font-size:1.1rem;color:var(--text);text-decoration:none;letter-spacing:0.02em}
.nav-logo em{color:var(--red2);font-style:italic}
.nav-links{display:flex;gap:2.5rem;list-style:none}
.nav-links a{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);text-decoration:none;letter-spacing:0.1em;text-transform:uppercase;transition:color 0.2s}
.nav-links a:hover{color:var(--text2)}

.wrap{position:relative;z-index:1;max-width:1080px;margin:0 auto;padding:0 3rem}

#hero{min-height:100vh;display:flex;flex-direction:column;justify-content:center;padding:10rem 3rem 6rem;max-width:1080px;margin:0 auto;position:relative;z-index:1}

.hero-kicker{display:flex;align-items:center;gap:1rem;margin-bottom:2.5rem}
.kicker-line{width:40px;height:1px;background:var(--red)}
.kicker-text{font-family:'DM Mono',monospace;font-size:11px;color:var(--red2);letter-spacing:0.18em;text-transform:uppercase}

h1{font-family:'DM Serif Display',serif;font-size:clamp(3.5rem,9vw,7.5rem);font-weight:400;line-height:0.95;letter-spacing:-0.02em;margin-bottom:2rem}
h1 .name-first{display:block;color:var(--text)}
h1 .name-last{display:block;color:transparent;-webkit-text-stroke:1px var(--red2);letter-spacing:0.02em}

.hero-body{display:grid;grid-template-columns:1fr 1fr;gap:4rem;align-items:end;margin-top:1rem}
.hero-desc{font-size:1.05rem;color:var(--text2);line-height:1.8;font-weight:300;max-width:400px}
.hero-desc strong{color:var(--text);font-weight:500}

.hero-right{display:flex;flex-direction:column;gap:1.5rem;align-items:flex-end}
.hero-cta{display:flex;gap:0.75rem;flex-wrap:wrap;justify-content:flex-end}

.btn{display:inline-flex;align-items:center;gap:0.5rem;padding:0.7rem 1.6rem;font-family:'DM Mono',monospace;font-size:11px;letter-spacing:0.08em;text-decoration:none;border-radius:2px;transition:all 0.25s;cursor:pointer;text-transform:uppercase}
.btn-red{background:var(--red);color:#fff;border:1px solid var(--red)}
.btn-red:hover{background:var(--red2);border-color:var(--red2)}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--dim)}
.btn-ghost:hover{border-color:var(--red);color:var(--text)}

.hero-stats{display:flex;gap:2.5rem}
.stat{text-align:right}
.stat-n{font-family:'DM Serif Display',serif;font-size:2.5rem;color:var(--text);line-height:1}
.stat-l{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:0.1em;text-transform:uppercase;margin-top:4px}

.hero-scroll{position:absolute;bottom:3rem;left:3rem;display:flex;align-items:center;gap:0.75rem;font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:0.1em;text-transform:uppercase}
.hero-scroll::before{content:'';display:block;width:1px;height:40px;background:linear-gradient(to bottom,var(--red),transparent)}

.divider{width:100%;height:1px;background:linear-gradient(to right,transparent,var(--border),transparent);margin:0}

section{position:relative;z-index:1}
.section-inner{padding:6rem 3rem;max-width:1080px;margin:0 auto}

.eyebrow{display:flex;align-items:center;gap:1rem;margin-bottom:3.5rem}
.eyebrow-num{font-family:'DM Mono',monospace;font-size:10px;color:var(--red2);letter-spacing:0.15em}
.eyebrow-title{font-family:'DM Serif Display',serif;font-size:2rem;color:var(--text);font-weight:400}
.eyebrow-rule{flex:1;height:1px;background:var(--border)}

.about-layout{display:grid;grid-template-columns:1.2fr 1fr;gap:5rem;align-items:start}
.about-text p{color:var(--text2);font-size:1rem;line-height:1.9;margin-bottom:1.1rem;font-weight:300}
.about-text p strong{color:var(--text);font-weight:500}

.info-stack{display:flex;flex-direction:column;gap:0;border:1px solid var(--border);border-radius:4px;overflow:hidden}
.info-row{display:grid;grid-template-columns:90px 1fr;gap:1rem;padding:0.85rem 1.1rem;border-bottom:1px solid var(--border);transition:background 0.15s}
.info-row:last-child{border-bottom:none}
.info-row:hover{background:var(--red-glow)}
.info-key{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:0.1em;text-transform:uppercase;padding-top:2px}
.info-val{font-size:13.5px;color:var(--text2)}

#skills{background:var(--bg2)}
.skills-layout{display:grid;grid-template-columns:repeat(2,1fr);gap:1px;background:var(--border);border:1px solid var(--border);border-radius:4px;overflow:hidden}
.skill-block{background:var(--bg2);padding:2rem;transition:background 0.2s}
.skill-block:hover{background:var(--card2)}
.skill-block-label{font-family:'DM Mono',monospace;font-size:10px;color:var(--blue2);letter-spacing:0.14em;text-transform:uppercase;margin-bottom:1.25rem}
.skill-chips{display:flex;flex-wrap:wrap;gap:0.5rem}
.chip{font-family:'DM Mono',monospace;font-size:11px;color:var(--text2);background:var(--blue-dim);border:1px solid var(--border-blue);padding:4px 10px;border-radius:2px;letter-spacing:0.03em;transition:all 0.15s}
.chip:hover{color:var(--blue2);border-color:rgba(58,123,213,0.4)}

.projects-layout{display:flex;flex-direction:column;gap:1px;background:var(--border);border:1px solid var(--border);border-radius:4px;overflow:hidden}

.proj{display:grid;grid-template-columns:56px 1fr auto;gap:0;background:var(--card);text-decoration:none;color:inherit;transition:background 0.2s;border-bottom:1px solid var(--border)}
.proj:last-child{border-bottom:none}
.proj:hover{background:var(--card2)}
.proj.featured{grid-template-columns:1fr;display:block;background:var(--card2)}
.proj:hover .proj-arrow{color:var(--red2);transform:translate(2px,-2px)}

.proj-num-col{padding:1.75rem 0 1.75rem 1.5rem;display:flex;align-items:flex-start;padding-top:1.9rem}
.proj-num{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:0.1em}

.proj-body{padding:1.75rem 1.5rem}
.proj-featured-inner{padding:2.5rem}

.proj-meta{display:flex;align-items:center;gap:1rem;margin-bottom:0.6rem}
.proj-label{font-family:'DM Mono',monospace;font-size:10px;color:var(--red2);letter-spacing:0.14em;text-transform:uppercase}

.proj-title{font-family:'DM Serif Display',serif;font-size:1.3rem;font-weight:400;color:var(--text);margin-bottom:0.6rem;line-height:1.25}
.proj.featured .proj-title{font-size:1.85rem;margin-bottom:0.85rem}

.proj-desc{font-size:13.5px;color:var(--text2);line-height:1.75;font-weight:300;max-width:640px}

.proj-chips{display:flex;flex-wrap:wrap;gap:0.4rem;margin-top:1rem}
.proj-chip{font-family:'DM Mono',monospace;font-size:10px;color:var(--blue2);border:1px solid var(--border-blue);background:var(--blue-glow);padding:3px 9px;border-radius:2px;letter-spacing:0.04em}

.proj-arrow-col{padding:1.75rem 1.5rem 1.75rem 0;display:flex;align-items:center}
.proj-arrow{font-size:1.1rem;color:var(--muted);transition:all 0.2s}

.status-dot{display:inline-flex;align-items:center;gap:5px;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.08em}
.status-dot.live{color:var(--red2)}
.status-dot.live::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--red2);animation:blink 2s infinite}
.status-dot.soon{color:var(--muted)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.25}}

#contact{background:var(--bg2)}
.contact-layout{display:grid;grid-template-columns:1.1fr 1fr;gap:6rem;align-items:start}
.contact-heading{font-family:'DM Serif Display',serif;font-size:2.75rem;font-weight:400;line-height:1.1;margin-bottom:1.5rem}
.contact-heading em{font-style:italic;color:var(--red2)}
.contact-sub{color:var(--text2);font-weight:300;line-height:1.8;margin-bottom:2.5rem;font-size:0.95rem}
.contact-mail{display:inline-flex;align-items:center;gap:0.6rem;font-family:'DM Mono',monospace;font-size:13px;color:var(--red2);text-decoration:none;border-bottom:1px solid var(--border2);padding-bottom:4px;transition:all 0.2s;letter-spacing:0.04em}
.contact-mail:hover{color:var(--text);border-color:var(--text)}

.link-list{display:flex;flex-direction:column;gap:0;border:1px solid var(--border);border-radius:4px;overflow:hidden}
.link-item{display:flex;align-items:center;justify-content:space-between;padding:1.1rem 1.25rem;text-decoration:none;color:var(--text2);border-bottom:1px solid var(--border);font-size:13.5px;transition:all 0.2s}
.link-item:last-child{border-bottom:none}
.link-item:hover{background:var(--red-glow);color:var(--text)}
.link-item:hover .link-arr{color:var(--red2)}
.link-platform{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:0.1em;text-transform:uppercase;min-width:70px}
.link-arr{color:var(--dim);transition:color 0.2s;font-size:13px}

footer{position:relative;z-index:1;padding:1.75rem 3rem;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.footer-sig{font-family:'DM Serif Display',serif;font-size:0.9rem;color:var(--muted);font-style:italic}
.footer-mono{font-family:'DM Mono',monospace;font-size:10px;color:var(--dim);letter-spacing:0.1em}

@media(max-width:768px){
  nav{padding:1rem 1.5rem}
  #hero{padding:8rem 1.5rem 4rem}
  .hero-body{grid-template-columns:1fr;gap:2rem}
  .hero-right{align-items:flex-start}
  .hero-cta{justify-content:flex-start}
  .hero-stats{justify-content:flex-start}
  .section-inner{padding:4rem 1.5rem}
  .about-layout,.contact-layout{grid-template-columns:1fr;gap:2.5rem}
  .skills-layout{grid-template-columns:1fr}
  .proj{grid-template-columns:1fr}
  .proj-num-col{display:none}
  .proj-arrow-col{display:none}
  footer{padding:1.25rem 1.5rem;flex-direction:column;gap:0.5rem;text-align:center}
}
</style>
</head>
<body>

<nav>
  <a href="#hero" class="nav-logo">Sarah <em>G.</em></a>
  <ul class="nav-links">
    <li><a href="#about">About</a></li>
    <li><a href="#skills">Skills</a></li>
    <li><a href="#projects">Projects</a></li>
    <li><a href="#contact">Contact</a></li>
  </ul>
</nav>

<section id="hero">
  <div class="hero-kicker">
    <span class="kicker-line"></span>
    <span class="kicker-text" id="hero-tagline">Data Scientist · Algiers</span>
  </div>
  <h1>
    <span class="name-first" id="hero-firstname">Sarah</span>
    <span class="name-last" id="hero-lastname">Goudjil</span>
  </h1>
  <div class="hero-body">
    <p class="hero-desc" id="hero-desc">Loading...</p>
    <div class="hero-right">
      <div class="hero-stats" id="hero-stats"></div>
      <div class="hero-cta">
        <a href="#projects" class="btn btn-red">View work →</a>
        <a href="#contact" class="btn btn-ghost">Get in touch</a>
      </div>
    </div>
  </div>
  <div class="hero-scroll">scroll</div>
</section>

<div class="divider"></div>

<section id="about">
  <div class="section-inner">
    <div class="eyebrow">
      <span class="eyebrow-num">01</span>
      <h2 class="eyebrow-title">About</h2>
      <div class="eyebrow-rule"></div>
    </div>
    <div class="about-layout">
      <div class="about-text" id="about-text"></div>
      <div class="info-stack" id="about-info"></div>
    </div>
  </div>
</section>

<div class="divider"></div>

<section id="skills">
  <div class="section-inner">
    <div class="eyebrow">
      <span class="eyebrow-num">02</span>
      <h2 class="eyebrow-title">Skills</h2>
      <div class="eyebrow-rule"></div>
    </div>
    <div class="skills-layout" id="skills-layout"></div>
  </div>
</section>

<div class="divider"></div>

<section id="projects">
  <div class="section-inner">
    <div class="eyebrow">
      <span class="eyebrow-num">03</span>
      <h2 class="eyebrow-title">Projects</h2>
      <div class="eyebrow-rule"></div>
    </div>
    <div class="projects-layout" id="projects-layout"></div>
  </div>
</section>

<div class="divider"></div>

<section id="contact">
  <div class="section-inner">
    <div class="eyebrow">
      <span class="eyebrow-num">04</span>
      <h2 class="eyebrow-title">Contact</h2>
      <div class="eyebrow-rule"></div>
    </div>
    <div class="contact-layout">
      <div>
        <h3 class="contact-heading">Let's<br/><em>talk.</em></h3>
        <p class="contact-sub" id="contact-blurb"></p>
        <a class="contact-mail" id="contact-email" href="#">loading...</a>
      </div>
      <div class="link-list" id="contact-links"></div>
    </div>
  </div>
</section>

<footer>
  <span class="footer-sig" id="footer-name">Sarah Goudjil</span>
  <span class="footer-mono">© 2025 · Algiers, DZ</span>
</footer>

<script>
async function loadData() {
  try {
    const res = await fetch('data.json');
    if (!res.ok) throw new Error('data.json not found');
    const data = await res.json();
    renderHero(data.hero);
    renderAbout(data.about);
    renderSkills(data.skills);
    renderProjects(data.projects);
    renderContact(data.contact);
  } catch(e) {
    console.error('Could not load data.json:', e);
  }
}

function renderHero(h) {
  document.getElementById('hero-firstname').textContent = h.firstName;
  document.getElementById('hero-lastname').textContent = h.lastName;
  document.getElementById('hero-tagline').textContent = h.title;
  document.getElementById('hero-desc').innerHTML = h.description;
  document.querySelector('.nav-logo').innerHTML = `${h.firstName} <em>${h.lastName.charAt(0)}.</em>`;
  document.getElementById('footer-name').textContent = `${h.firstName} ${h.lastName}`;
  document.getElementById('hero-stats').innerHTML = h.stats.map(s => `
    <div class="stat">
      <div class="stat-n">${s.value}</div>
      <div class="stat-l">${s.label}</div>
    </div>`).join('');
}

function renderAbout(a) {
  document.getElementById('about-text').innerHTML =
    a.paragraphs.map(p => `<p>${p}</p>`).join('');
  document.getElementById('about-info').innerHTML =
    a.info.map(i => `
      <div class="info-row">
        <span class="info-key">${i.key}</span>
        <span class="info-val">${i.value}</span>
      </div>`).join('');
}

function renderSkills(skills) {
  document.getElementById('skills-layout').innerHTML =
    skills.map(s => `
      <div class="skill-block">
        <div class="skill-block-label">${s.category}</div>
        <div class="skill-chips">
          ${s.items.map(i => `<span class="chip">${i}</span>`).join('')}
        </div>
      </div>`).join('');
}

function renderProjects(projects) {
  document.getElementById('projects-layout').innerHTML =
    projects.map((p, idx) => {
      const status = p.status === 'live'
        ? `<span class="status-dot live">in progress</span>`
        : `<span class="status-dot soon">planned</span>`;
      const chips = p.tags.map(t => `<span class="proj-chip">${t}</span>`).join('');
      const link = p.link || '#';
      if (p.featured) {
        return `
          <a href="${link}" class="proj featured">
            <div class="proj-featured-inner">
              <div class="proj-meta">
                <span class="proj-label">${p.label || 'Featured · 01'}</span>
                ${status}
              </div>
              <div class="proj-title">${p.title}</div>
              <p class="proj-desc">${p.desc}</p>
              <div class="proj-chips">${chips}</div>
            </div>
          </a>`;
      } else {
        return `
          <a href="${link}" class="proj">
            <div class="proj-num-col">
              <span class="proj-num">${String(idx + 1).padStart(2, '0')}</span>
            </div>
            <div class="proj-body">
              <div class="proj-meta">
                <span class="proj-label">${p.label || ''}</span>
                ${status}
              </div>
              <div class="proj-title">${p.title}</div>
              <p class="proj-desc">${p.desc}</p>
              <div class="proj-chips">${chips}</div>
            </div>
            <div class="proj-arrow-col"><span class="proj-arrow">↗</span></div>
          </a>`;
      }
    }).join('');
}

function renderContact(c) {
  document.getElementById('contact-blurb').textContent = c.blurb;
  const emailEl = document.getElementById('contact-email');
  emailEl.href = `mailto:${c.email}`;
  emailEl.textContent = `✉ ${c.email}`;
  document.getElementById('contact-links').innerHTML =
    c.links.map(l => `
      <a href="${l.url}" target="_blank" rel="noopener" class="link-item">
        <span class="link-platform">${l.platform}</span>
        <span>${l.url.replace('https://', '')}</span>
        <span class="link-arr">↗</span>
      </a>`).join('');
}

loadData();
</script>
</body>
</html>
